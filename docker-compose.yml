version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: infrapilot
      POSTGRES_PASSWORD: infrapilot
      POSTGRES_DB: infrapilot
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  frontend:
    build:
      context: ./frontend
      args:
        # Build-time variable needed for Next.js standalone
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    environment:
      # Runtime variable
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"

  caddy:
    image: caddy:2
    # Run Caddy on the host network so it can proxy to dynamically bound ports from user deployments
    network_mode: "host"
    volumes:
      - caddy-data:/data
      - caddy-config:/config

volumes:
  pgdata:
  caddy-data:
  caddy-config:
